<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#141920"/>

  <!-- Pullback diagram: commutative square showing P -> X, P -> Y, X -> Z, Y -> Z -->
  <!-- This represents the pullback construction from category theory -->

  <!-- Vertical line (P to Y) -->
  <line x1="25" y1="25" x2="25" y2="70" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal line (P to X) -->
  <line x1="25" y1="25" x2="70" y2="25" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Vertical line (X to Z) -->
  <line x1="70" y1="25" x2="70" y2="70" stroke="#9ba3af" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Horizontal line (Y to Z) -->
  <line x1="25" y1="70" x2="70" y2="70" stroke="#9ba3af" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Arrow heads for P -> X -->
  <polygon points="65,25 70,22 68,30" fill="#d4a843"/>

  <!-- Arrow heads for P -> Y -->
  <polygon points="25,65 22,70 30,68" fill="#d4a843"/>

  <!-- Corner circle (the pullback object) -->
  <circle cx="25" cy="25" r="3.5" fill="#d4a843"/>

  <!-- Bottom right intersection point -->
  <circle cx="70" cy="70" r="2.5" fill="#9ba3af" opacity="0.6"/>
</svg>
